app-id: com.softwalk.oaplayer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: oa-player-wrapper
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: oa-player
    buildsystem: simple
    build-commands:
      # Extract the .deb and install files to /app
      - ar x oa-player_0.5.9_amd64.deb
      - tar xf data.tar.xz
      - cp -r usr/* /app/
      - cp -r opt /app/
      # Ensure the executable is in the path
      - mkdir -p /app/bin
      - ln -s "/app/opt/OA Player/oa-player" /app/bin/oa-player  
      - echo '#!/bin/sh' > /app/bin/oa-player-wrapper
      - echo 'exec "/app/opt/OA Player/oa-player" --no-sandbox "$@"' >> /app/bin/oa-player-wrapper
      - chmod +x /app/bin/oa-player-wrapper   
      # Fix icon path if necessary
      - mkdir -p /app/share/icons/hicolor/512x512/apps
      - install -Dm644 com.softwalk.oaplayer.png /app/share/icons/hicolor/512x512/apps/com.softwalk.oaplayer.png
      - install -Dm644 com.softwalk.oaplayer.desktop /app/share/applications/com.softwalk.oaplayer.desktop
      - install -Dm644 com.softwalk.oaplayer.metainfo.xml /app/share/metainfo/com.softwalk.oaplayer.metainfo.xml
    sources:
      - type: file
        path: release/oa-player_0.5.9_amd64.deb

      - type: file
        path: com.softwalk.oaplayer.png
      - type: file
        path: com.softwalk.oaplayer.desktop
      - type: file
        path: com.softwalk.oaplayer.metainfo.xml